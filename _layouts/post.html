---

<!DOCTYPE html>
<html>
    <head>
        <title>{{ page.title }}</title>

        <link rel="stylesheet" href="{{ site.baseurl }}/styles/main.css">
        <link rel="stylesheet" href="{{ site.baseurl }}/styles/post/index.css">
        <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Delicious+Handrawn&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Grotesk:wght@300..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    </head>
    <body>
        <nav class="navbar-desktop">
            <a href="{{ site.baseurl }}" class="navbar-desktop-logo">roba <span class="navbar-desktop-logo-thin">blog</span></a>
            <div class="navbar-desktop-links">
                <div class="navbar-desktop-theme-container">
                    <a class="navbar-desktop-theme">theme ▾</a>
                    <div class="navbar-desktop-theme-dropdown">
                        <div class="navbar-theme-left">
                            <div class="navbar-theme-colour">
                                <p class="navbar-theme-title navbar-theme-colour-title">Theme:</p>
                                <div class="navbar-theme-colour-options">

                                </div>
                            </div>  
                            <div class="navbar-theme-font">
                                <p class="navbar-theme-title navbar-theme-font-title">Font:</p>

                                <div id="navbar-theme-font-container" class="navbar-theme-font-container">
                                </div>
                            </div>
                        </div>

                        <div class="navbar-theme-right">
                            <p class="navbar-theme-right-preview">This is a preview of what your text will look like</p>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="post-container">
            <div class="post-info">
                <img class="post-info-banner" src="{{ page.banner }}">
                <h1 class="post-info-title">{{ page.title }}</h1>
            </div>

            <div class="post-content">
                {{ content }}
            </div>
        </div>

        <script src="{{ site.baseurl }}/scripts/themes.js"></script>
    </body>
</html>
